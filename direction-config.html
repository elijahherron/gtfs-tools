<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Direction Configuration Tool</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="direction-config.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      /* Page-specific overrides */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        background: #f5f5f5;
      }
      .page-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }
      .page-header {
        background: linear-gradient(135deg, #2c5aa0 0%, #1c4580 100%);
        color: white;
        padding: 20px 30px;
        margin: -20px -20px 20px -20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .page-header h1 {
        margin: 0;
        font-size: 24px;
      }
      .page-header p {
        margin: 5px 0 0 0;
        opacity: 0.9;
        font-size: 14px;
      }
      .back-link {
        color: white;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: rgba(255,255,255,0.1);
        border-radius: 4px;
        transition: background 0.2s;
      }
      .back-link:hover {
        background: rgba(255,255,255,0.2);
      }
      .main-content {
        background: white;
        border-radius: 8px;
        padding: 30px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      /* Override section styles for standalone page */
      #direction-config-section {
        display: block !important;
        padding: 0;
        min-height: auto;
        background: transparent;
      }
      .section-header {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="page-header">
        <div>
          <h1>Direction Configuration Tool</h1>
          <p>Configure route direction stop sequences with branching support</p>
        </div>
        <a href="index.html" class="back-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back to GTFS Tools
        </a>
      </div>

      <div class="main-content">
        <!-- Upload Panel -->
        <div class="direction-upload-panel">
          <div class="upload-tabs">
            <button class="upload-tab active" data-tab="gtfs">Upload GTFS</button>
            <button class="upload-tab" data-tab="json">Import JSON</button>
          </div>

          <div class="upload-tab-content active" id="gtfs-upload-tab">
            <div class="upload-options">
              <div class="upload-option">
                <label for="directionGtfsUpload">Upload GTFS .zip or stops.txt:</label>
                <input type="file" id="directionGtfsUpload" accept=".zip,.txt" />
              </div>
              <div class="upload-option">
                <label for="directionGtfsUrl">Or load from URL:</label>
                <input type="text" id="directionGtfsUrl" placeholder="https://example.com/gtfs.zip" />
              </div>
            </div>
            <button id="directionUploadBtn" class="primary-btn">Load GTFS</button>
          </div>

          <div class="upload-tab-content" id="json-import-tab">
            <label for="directionJsonImport">Paste existing direction config JSON:</label>
            <textarea id="directionJsonImport" rows="6" placeholder='{"directionConfigurationsByRouteKey": {...}}'></textarea>
            <button id="directionImportBtn" class="primary-btn">Import Config</button>
          </div>

          <div id="directionUploadStatus" class="upload-status"></div>
        </div>

        <!-- Editor Panel (hidden until GTFS loaded) -->
        <div class="direction-editor-panel" id="directionEditorPanel" style="display: none;">
          <!-- Route Key Input -->
          <div class="route-key-section">
            <label for="routeKeyInput">Route Key:</label>
            <input type="text" id="routeKeyInput" placeholder="e.g., Lok_Saltsjöbanan" />
          </div>

          <!-- Direction Selector -->
          <div class="direction-selector">
            <label for="directionSelect">Direction:</label>
            <select id="directionSelect"></select>
            <button id="addDirectionBtn" class="secondary-btn">+ Add Direction</button>
            <button id="deleteDirectionBtn" class="danger-btn" style="display: none;">Delete Direction</button>
          </div>

          <!-- Direction Settings -->
          <div class="direction-settings" id="directionSettings">
            <div class="settings-row">
              <div class="setting-field">
                <label for="directionKeyInput">Direction Key:</label>
                <input type="text" id="directionKeyInput" placeholder="e.g., West" />
              </div>
              <div class="setting-field">
                <label for="directionIdSelect">Direction ID:</label>
                <select id="directionIdSelect">
                  <option value="0">0</option>
                  <option value="1">1</option>
                </select>
              </div>
            </div>
            <div class="settings-row">
              <div class="setting-field">
                <label for="tripHeadsignPattern">Trip Headsign Pattern:</label>
                <input type="text" id="tripHeadsignPattern" placeholder="e.g., Henriksdal" />
              </div>
              <div class="setting-field">
                <label for="idFromSelect">ID From:</label>
                <select id="idFromSelect">
                  <option value="raw_stop_id">raw_stop_id</option>
                  <option value="stop_id">stop_id</option>
                </select>
              </div>
            </div>
          </div>

          <!-- View Toggle -->
          <div class="view-toggle direction-view-toggle">
            <button class="view-btn active" data-view="diagram">Diagram View</button>
            <button class="view-btn" data-view="map">Map View</button>
          </div>

          <!-- Diagram View -->
          <div class="direction-view active" id="diagramView">
            <div class="diagram-container" id="diagramContainer">
              <!-- Columns will be rendered here dynamically -->
            </div>
            <div class="diagram-actions">
              <div class="add-stop-group">
                <label for="addToColumnSelect">Add to branch:</label>
                <select id="addToColumnSelect">
                  <option value="0">Branch 0</option>
                </select>
                <button id="addStopBtn" class="secondary-btn">+ Add Stop</button>
              </div>
              <button id="addBranchBtn" class="secondary-btn">+ New Branch</button>
              <span style="flex: 1;"></span>
              <button id="collapseAllBtn" class="secondary-btn">Collapse All</button>
              <button id="expandAllBtn" class="secondary-btn">Expand All</button>
            </div>
          </div>

          <!-- Map View -->
          <div class="direction-view" id="mapView">
            <div class="direction-map-container" id="directionMapContainer"></div>
            <div class="map-legend">
              <span class="legend-item"><span class="legend-color column-0"></span> Column 0</span>
              <span class="legend-item"><span class="legend-color column-1"></span> Column 1</span>
            </div>
          </div>
        </div>

        <!-- JSON Output Panel -->
        <div class="json-output-panel" id="jsonOutputPanel" style="display: none;">
          <div class="json-output-header">
            <h3>Generated JSON</h3>
            <button id="copyJsonBtn" class="secondary-btn">Copy to Clipboard</button>
          </div>
          <pre id="jsonOutput" class="json-output"></pre>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="direction-config.js"></script>
    <script>
      // Initialize when DOM is ready
      document.addEventListener('DOMContentLoaded', function() {
        if (window.directionConfigEditor) {
          window.directionConfigEditor.initialize();
          console.log('Direction Config Editor initialized');
        }
      });
    </script>
  </body>
</html>
